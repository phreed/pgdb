# Podman secrets for pgdb graph database quadlets.
# This file is encrypted at rest with git-crypt.
#
# After editing values:
#   pixi run create-secrets
#
# First-time git-crypt setup:
#   git-crypt init
#   git-crypt add-gpg-user <key-id>
#   git add -f podman.secret.toml   # override .gitignore

[neo4j-auth]
description = "Neo4j authentication — format: neo4j/<password> or 'none' to disable"
value = "neo4j/changeme"

[apache-age-password]
description = "PostgreSQL password for the age_user account in Apache AGE"
value = "changeme"

[allegro-graph-password]
description = "AllegroGraph admin superuser password"
value = "changeme"

[jena-fuseki-admin-password]
description = "Apache Jena Fuseki admin interface password"
value = "changeme"

[arcade-db-root-password]
description = "ArcadeDB root server password (env var target uses dot notation)"
value = "changeme"

[rdfox-license]
description = "RDFox license — base64-encoded content of the .rdfox-license file"
value = ""
